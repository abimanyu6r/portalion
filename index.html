<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPA PKK - Landing Page</title>
    <link rel="stylesheet" href="fonts/fonts.css">
    <link rel="icon" href="foto/upa-pkk-logo-1.png">
    <link rel="manifest" href="manifest.json">
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js");
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('foto/Landing-Page.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Koulen', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
        }

        .subtitle {
            font-size: 60px;
            color: #999;
            font-weight: 500;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Koulen', sans-serif;
            line-height: 50px;
        }

        .title {
            font-family: 'Koulen', sans-serif;
            font-size: 60px;
            color: #000;
            font-weight: 400;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #2563eb;
            color: white;
            padding: 12px 35px;
            border: none;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 400;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 2px;
        }

        .btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .btn i {
            font-size: 14px;
        }

        .hero-img {
            /* aspect-ratio: 1/1; */
            width: 400px;

        }

        @media (max-width: 768px) {
            .subtitle {
                font-size: 18px;
            }

            .title {
                font-size: 50px;
            }

            .buttons {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
